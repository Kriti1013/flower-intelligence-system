<!DOCTYPE html>
<html>
<head>
    <title>Petal Length Predictor</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
            width:400px;
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:12px;
            cursor:pointer;
        }

        h2{
            margin-top:20px;
        }
    </style>
</head>

<body>

<div class="container">

<h1>🌸 Petal Length Predictor</h1>

<form action="/predict_petal" method="POST">

    <input type="number" step="0.01" name="sepal_length"
           placeholder="Sepal Length" required>

    <input type="number" step="0.01" name="sepal_width"
           placeholder="Sepal Width" required>

    <input type="number" step="0.01" name="petal_width"
           placeholder="Petal Width" required>

    <button type="submit">Predict</button>

</form>

<h2>{{ prediction_text }}</h2>

<br>

<a href="/">
    <button>Home</button>
</a>

</div>

</body>
</html>
