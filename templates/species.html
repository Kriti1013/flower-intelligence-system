<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Species Predictor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .container{
            background:white;
            width:450px;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
            animation:fadeIn 0.8s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h1{
            color:#333;
            margin-bottom:10px;
        }

        .subtitle{
            color:#777;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:2px solid #ddd;
            border-radius:10px;
            font-size:16px;
            transition:0.3s;
        }

        input:focus{
            border-color:#667eea;
            outline:none;
        }

        .predict-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#667eea;
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .predict-btn:hover{
            background:#5563d6;
            transform:translateY(-2px);
        }

        .home-btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2ecc71;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:12px;
        }

        .home-btn:hover{
            background:#27ae60;
        }

        .result{
            margin-top:25px;
            padding:15px;
            border-radius:12px;
            background:#f8f9ff;
            border-left:5px solid #667eea;
            font-size:22px;
            font-weight:bold;
            color:#333;
        }

        .flower{
            font-size:55px;
            margin-bottom:10px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="flower">🌿</div>

    <h1>Species Predictor</h1>

    <p class="subtitle">
        Predict Iris flower species using Machine Learning
    </p>

    <form action="/predict_species" method="POST">

        <input
            type="number"
            step="0.01"
            name="sepal_length"
            placeholder="Sepal Length"
            required>

        <input
            type="number"
            step="0.01"
            name="sepal_width"
            placeholder="Sepal Width"
            required>

        <input
            type="number"
            step="0.01"
            name="petal_length"
            placeholder="Petal Length"
            required>

        <input
            type="number"
            step="0.01"
            name="petal_width"
            placeholder="Petal Width"
            required>

        <button class="predict-btn" type="submit">
            Predict Species
        </button>

    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

    <a href="/">
        <button class="home-btn">
            ⬅ Back Home
        </button>
    </a>

</div>

</body>
</html>
