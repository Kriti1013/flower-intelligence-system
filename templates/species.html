<!DOCTYPE html>
<html>
<head>
    <title>Species Predictor</title>
</head>
<body>

<h1>Species Predictor</h1>

<form action="/predict_species" method="POST">

<input type="number" step="0.01" name="sepal_length" placeholder="Sepal Length" required><br><br>

<input type="number" step="0.01" name="sepal_width" placeholder="Sepal Width" required><br><br>

<input type="number" step="0.01" name="petal_length" placeholder="Petal Length" required><br><br>

<input type="number" step="0.01" name="petal_width" placeholder="Petal Width" required><br><br>

<button type="submit">Predict Species</button>

</form>

<h2>{{ prediction_text }}</h2>

</body>
</html>
